version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: nwepp-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-nwepp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nwepp_secret}
      POSTGRES_DB: ${DB_NAME:-nwepp_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nwepp} -d ${DB_NAME:-nwepp_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nwepp-api
    restart: always
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
    ports:
      - "8081:8081"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: nwepp-frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
